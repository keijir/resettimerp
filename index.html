<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Token Reset PWA (FCM)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
    <link rel="icon" href="data:,">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkFJIHRva2VuIFJlc2V0IFRpbWVyIiwKICAic2hvcnRfbmFtZSI6ICJBSVRpbWVyIiwKICAic3RhcnRfdXJsIjogIi4iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwOTEwMTIiLAogICJ0aGVtZV9jb2xvciI6ICIjMTA4YjY2Igp9">
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
        button, select, input { touch-action: manipulation; }
        .ghost-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-4 pb-24" v-cloak>
    <div v-if="showOnboarding" class="fixed inset-0 z-50 bg-slate-950/95 flex flex-col justify-center items-center p-6 text-center space-y-5">
        <div class="w-14 h-14 bg-emerald-500/10 rounded-full flex items-center justify-center text-emerald-400 text-2xl">🔔</div>
        <h2 class="text-xl font-bold">AI解除通知システム</h2>
        <p class="text-xs text-slate-400 max-w-xs">制限解除のタイミングでスマホへ即時プッシュ通知を届けるため、通知を許可してください。</p>
        <button @click="requestNotificationPermission" class="w-full bg-emerald-500 text-slate-950 font-bold py-3.5 rounded-xl text-sm">
            通知を許可してマイページへ
        </button>
    </div>

    <div class="space-y-4">
        <header class="flex justify-between items-center py-2 border-b border-slate-800/60">
            <div>
                <h1 class="text-base font-bold text-white flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    AI Resetter Pro
                </h1>
            </div>
            <div class="flex gap-2">
                <button @click="toggleTab" class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-900 text-base">
                    {{ activeTab === 'main' ? '⚙️' : '📋' }}
                </button>
            </div>
        </header>

        <main v-if="activeTab === 'main'" class="space-y-4">
            <section v-if="activeTimers.length > 0" class="space-y-2">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">⏳ 稼働中の制限スケジュール ({{ activeTimers.length }})</h3>
                <div v-for="timer in activeTimers" :key="timer.id" class="ghost-card border border-slate-800 p-4 rounded-xl space-y-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-white text-sm">{{ timer.name }}</h4>
                            <p class="text-[11px] text-emerald-400 font-mono">⏱️ {{ formatAbsoluteTime(timer.targetTime) }} 解除</p>
                        </div>
                        <div class="flex gap-1">
                            <button @click="confirmCancel(timer.id)" class="bg-slate-800 text-xs px-2 py-1 rounded text-rose-400">🗑️ 削除</button>
                        </div>
                    </div>
                    <div class="text-xl font-mono font-bold text-slate-100 tracking-wide">{{ timer.timeLeft }}</div>
                    <div class="w-full bg-slate-950 h-1 rounded-full overflow-hidden">
                        <div class="bg-emerald-500 h-full transition-all duration-300" :style="{ width: timer.progress + '%' }"></div>
                    </div>
                </div>
            </section>

            <section class="space-y-2">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">⚡ タップして始動</h3>
                <div class="grid grid-cols-1 gap-2">
                    <button v-for="tool in presets" :key="tool.id" @click="startTimer(tool)" 
                        class="w-full bg-slate-900/60 border border-slate-800 p-3.5 rounded-xl flex justify-between items-center transition"
                        :class="{'opacity-50 cursor-not-allowed': isTimerRunning(tool.name)}">
                        <div class="flex items-center gap-3">
                            <span class="text-base">{{ tool.icon || '🤖' }}</span>
                            <div>
                                <div class="font-medium text-white text-sm">
                                    {{ tool.name }} 
                                    <span v-if="isTimerRunning(tool.name)" class="text-[10px] bg-slate-800 text-emerald-400 px-1.5 py-0.5 rounded ml-1 font-normal">稼働中</span>
                                </div>
                                <div class="text-[11px] text-slate-400">設定: {{ formatPeriod(tool) }}</div>
                            </div>
                        </div>
                        <span class="text-slate-600 text-xs">{{ isTimerRunning(tool.name) ? '🔒' : '▶' }}</span>
                    </button>
                </div>
            </section>
        </main>

        <main v-if="activeTab === 'settings'" class="space-y-4">
            <section class="bg-slate-900 border border-slate-800 p-4 rounded-xl space-y-2">
                <h3 class="text-xs font-bold text-white">💻 クラウドGAS設定</h3>
                <input type="text" v-model="gasUrl" placeholder="GASのウェブアプリURLをペースト" class="w-full bg-slate-950 border border-slate-800 p-2 rounded-lg text-xs font-mono text-white">
                
                <div class="flex gap-2 pt-1">
                    <button @click="saveGasSettings" class="flex-1 bg-emerald-500 text-slate-950 font-bold py-2 rounded-lg text-xs transition">
                        🔗 接続して同期する
                    </button>
                </div>

                <div class="text-[10px] text-slate-400 flex justify-between items-center pt-2 border-t border-slate-800/50 mt-2">
                    <span>システム通信ステータス:</span>
                    <span class="font-bold px-2 py-0.5 rounded text-[10px]" :class="notificationStatusText.includes('稼働中') ? 'bg-emerald-950 text-emerald-400' : 'bg-amber-950 text-amber-400'">
                        {{ notificationStatusText }}
                    </span>
                </div>
                
                <button @click="testPushNotification" v-if="notificationStatusText.includes('稼働中')" class="w-full mt-2 bg-slate-800 hover:bg-slate-700 text-white text-xs py-2 rounded-lg font-bold transition">
                    🔔 テストプッシュ通知を即時送信
                </button>
            </section>
        </main>
    </div>
</div>

<script>
// ==========================================
// ⚙️ Firebase 接続設定
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyBEWkFXCVxrXONInlv0wdF2w0djz6MQKI0",
    authDomain: "ai-reset-timer.firebaseapp.com",
    projectId: "ai-reset-timer",
    messagingSenderId: "43382846437",
    appId: "1:43382846437:web:449416a4cad3c1c5e7b50c"
};
firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();

const { createApp, ref, onMounted, computed } = Vue;

createApp({
    setup() {
        const activeTab = ref('main');
        const showOnboarding = ref(false);
        const userId = ref('');
        const gasUrl = ref('');
        const notificationStatusText = ref('未連動');
        const ticker = ref(0);

        const presets = ref([
            { id: '1', name: 'ChatGPT Plus', type: 'relative', minutes: 180, icon: '💬' },
            { id: '2', name: 'Claude 3.5 Sonnet', type: 'relative', minutes: 300, icon: '🧠' }
        ]);
        const activeTimersRaw = ref([]);

        // VAPID変換関数をsetupの「内部」に移動させ、スコープエラーを確実に解決
        const urlBase64ToUint8Array = (base64String) => {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        };

        const initSession = async () => {
            let localId = localStorage.getItem('ai_user_id') || 'usr-' + Math.random().toString(36).substring(2, 12);
            localStorage.setItem('ai_user_id', localId);
            userId.value = localId;
            gasUrl.value = localStorage.getItem('ai_gas_url') || '';

            if (localStorage.getItem('ai_active_timers')) {
                try { activeTimersRaw.value = JSON.parse(localStorage.getItem('ai_active_timers')); } catch(e) {}
            }

            setInterval(() => { ticker.value++; }, 1000);

            if ('Notification' in window) {
                if (Notification.permission === 'default') {
                    showOnboarding.value = true;
                } else if (Notification.permission === 'granted' && gasUrl.value) {
                    setupFirebasePush();
                }
            }
            updateStatusText();
        };

        const updateStatusText = () => {
            if (!gasUrl.value) { notificationStatusText.value = "URL未設定"; }
            else if ('Notification' in window && Notification.permission !== 'granted') { notificationStatusText.value = "通知未許可"; }
            else if (localStorage.getItem('ai_fcm_linked') === 'true') { notificationStatusText.value = "Firebaseプッシュ稼働中"; }
            else { notificationStatusText.value = "URL保存完了（未同期）"; }
        };

        const setupFirebasePush = async () => {
            if (!gasUrl.value || !('serviceWorker' in navigator)) return;

            try {
                // 1. サービスワーカー登録
                const reg = await navigator.serviceWorker.register('firebase-messaging-sw.js');
                console.log("Firebaseサービスワーカー登録成功:", reg);

                // 2. VAPIDキーのクレンジングと変換
                const rawVapidKey = 'BIelJEP1QAPB--9ImzdzE_frQcwV9E6N5RmjiGWqzmi8F9aZkAzec1pwzsziQzq8r_ibmfYNGoqnxBhcsVwdWD8'; // 👈 ご自身の公開鍵
                const cleanVapidKey = rawVapidKey.trim().replace(/^['"]|['"]$/g, '');
                
                if (cleanVapidKey.includes('YOUR_FIREBASE')) {
                    console.warn('VAPIDキーが初期値のままです。');
                    return;
                }

                const convertedVapidKey = urlBase64ToUint8Array(cleanVapidKey);

                // 3. ブラウザ標準のPushManagerを直接叩いて検証
                await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: convertedVapidKey
                });
                console.log("ブラウザのPush購読完了");

                // 4. Firebaseトークンに変換
                const currentToken = await messaging.getToken({ 
                    vapidKey: cleanVapidKey,
                    serviceWorkerRegistration: reg
                });
                
                if (currentToken) {
                    console.log("FCMトークン取得成功:", currentToken);
                    
                    // GASへ送信
                    await fetch(gasUrl.value, {
                        method: 'POST',
                        mode: 'cors', // CORS通信であることを明示
                        redirect: 'follow', // 👈 fetchの正しいオプション位置へ移動
                        body: JSON.stringify({
                            action: 'registerUser',
                            userId: userId.value,
                            fcmToken: currentToken
                        })
                    });
                    localStorage.setItem('ai_fcm_linked', 'true');
                    updateStatusText();
                } else {
                    console.warn('FCMトークンが空です。');
                }
            } catch (err) {
                console.error("FCM同期エラー詳細ログ:", err);
                localStorage.removeItem('ai_fcm_linked');
                notificationStatusText.value = "同期失敗 (再試行してください)";
            }
        };

        const saveGasSettings = async () => {
            if (!gasUrl.value) return;
            gasUrl.value = gasUrl.value.trim();
            localStorage.setItem('ai_gas_url', gasUrl.value);
            notificationStatusText.value = "Firebase同期中...";
            
            if ('Notification' in window && Notification.permission !== 'granted') {
                const permission = await Notification.requestPermission();
                if (permission !== 'granted') { updateStatusText(); return; }
            }
            await setupFirebasePush();
        };

        const requestNotificationPermission = async () => {
            if ('Notification' in window) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted' && gasUrl.value) { await setupFirebasePush(); }
            }
            showOnboarding.value = false;
            updateStatusText();
        };

        const isTimerRunning = (name) => {
            const now = Date.now();
            const found = activeTimersRaw.value.find(t => t.name === name);
            return found ? (found.targetTime - now > 0) : false;
        };

        const startTimer = async (tool) => {
            if (isTimerRunning(tool.name)) return;
            const now = Date.now();
            const targetTime = now + (tool.minutes * 60 * 1000);
            const uniqueId = 'tmr-' + Date.now();
            const newTimer = { id: uniqueId, name: tool.name, startTime: now, targetTime, duration: targetTime - now };
            
            activeTimersRaw.value.push(newTimer);
            localStorage.setItem('ai_active_timers', JSON.stringify(activeTimersRaw.value));

            if (gasUrl.value) {
                fetch(gasUrl.value, { method: 'POST', body: JSON.stringify({ action: 'startTimer', userId: userId.value, timer: newTimer }) }).catch(()=>{});
            }
        };

        const testPushNotification = () => {
            if (!gasUrl.value) return;
            fetch(gasUrl.value, { method: 'POST', body: JSON.stringify({ action: 'testPush', userId: userId.value }) })
                .then(() => alert('Firebase経由のテスト通知を要求しました！アプリを閉じてお待ちください。'));
        };

        const confirmCancel = (id) => { activeTimersRaw.value = activeTimersRaw.value.filter(t => t.id !== id); localStorage.setItem('ai_active_timers', JSON.stringify(activeTimersRaw.value)); };
        
        const activeTimers = computed(() => {
            ticker.value; const now = Date.now();
            return activeTimersRaw.value.map(t => {
                const diff = t.targetTime - now;
                if (diff <= 0) return { ...t, timeLeft: '制限解除完了', progress: 100 };
                const hrs = Math.floor(diff / 3600000); const mins = Math.floor((diff % 3600000) / 60000); const secs = Math.floor((diff % 60000) / 1000);
                return { ...t, timeLeft: hrs + "h " + mins + "m " + secs + "s", progress: Math.max(0, Math.min(100, ((t.duration - diff) / t.duration) * 100)) };
            });
        });

        const formatPeriod = (t) => t.minutes + "分後";
        const formatAbsoluteTime = (ts) => { const d = new Date(ts); return (d.getMonth()+1) + "/" + d.getDate() + " " + String(d.getHours()).padStart(2,'0') + ":" + String(d.getMinutes()).padStart(2,'0'); };
        const toggleTab = () => { activeTab.value = activeTab.value === 'main' ? 'settings' : 'main'; };

        onMounted(() => { initSession(); });

        return {
            activeTab, showOnboarding, gasUrl, notificationStatusText, presets, activeTimers, isTimerRunning,
            startTimer, confirmCancel, saveGasSettings, formatPeriod, formatAbsoluteTime, toggleTab, requestNotificationPermission, testPushNotification
        };
    }
}).mount('#app');
</script>
</body>
</html>
